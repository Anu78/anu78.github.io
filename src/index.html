<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <title>Think4Change</title>
    <meta name="description" content="Think4Change" />
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css"
      integrity="sha384-9aIt2nRpC12Uk9gS9baDl411NQApFmC26EwAOH8WgZl5MYYxFfc+NcPb1dKGj7Sk"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Muli:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="shortcut icon" type="image/x-icon" href="graphics/favicon.ico" />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <<header>>
    <section id="main-section">
      <hr id="lightBar" style="height:5px;border-width:0;color:black;background-color:black">
      <div id="carouselExampleControls" class="carousel slide" data-ride="carousel">
        <div class="carousel-inner">
          <div class="carousel-item active">
            <img class="d-block w-100 slideshow-image"  src="graphics/intro-to-calc-banner.svg" alt="First slide">
          </div>
          <div class="carousel-item">
            <img class="d-block w-100" src="graphics/math-for-you-graphic.svg" alt="Second slide">
          </div>
        </div>
        <a class="carousel-control-prev" href="#carouselExampleControls" role="button" data-slide="prev">
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="sr-only">Previous</span>
        </a>
        <a class="carousel-control-next" href="#carouselExampleControls" role="button" data-slide="next">
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
          <span class="sr-only">Next</span>
        </a>
      </div>
    </section>

    <section id="ask-learn-section">
      <div class="container-fluid padding">
        <div class="row">
          <div class="col-sm" id="learn-div">
            <center class="learn-ask-text">
              <img src="https://img.icons8.com/ios/100/000000/book.png" />
              <br />
              Learn
              <br />
              <a class="btn btn-outline-primary" href="https://think4change.org/specialEvents" role="button">View Events</a>
            </center>
          </div>
          <div class="col-sm" id="ask-div">
            <center class="learn-ask-text">
              <img
                src="https://img.icons8.com/ios/100/000000/ask-question.png"
              />
              <br />
              Ask
              <br />
              <a class="btn btn-outline-primary" href="https://docs.google.com/forms/d/e/1FAIpQLScIMpk_RbYf0b-DJwVyNQLhbZlmV-ZFNpKQgFxeoBEZxDLI3Q/viewform?usp=sf_link" role="button">Submit</a>
            </center>
          </div>
        </div>
      </div>
      <script
        src="https://code.jquery.com/jquery-3.5.1.slim.min.js"
        integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
        crossorigin="anonymous"
      ></script>
      <br>

    </section>

    <<footer>>

      <hr class="clearfix w-100 d-md-none pb-3">
    <script
      src="https://code.jquery.com/jquery-3.5.1.slim.min.js"
      integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"
      integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"
      integrity="sha384-OgVRvuATP1z7JjHLkuOU7Xw704+h835Lr+6QL9UvYjZE3Ipu6Tp75j7Bh/kR0JKI"
      crossorigin="anonymous"
    ></script>
    <script>

    $("#menu-math1").hover(
        function () {
            $("#lightBar").css("background-color", "#90e0ef");
        }
    );

    $("#menu-math2").hover(
        function () {
            $("#lightBar").css("background-color", "#4acae4");    }
    );

    $("#menu-math3").hover(
        function () {
            $("#lightBar").css("background-color", "#0096c7");    }
    );

    $("#menu-preCalc").hover(
        function () {
            $("#lightBar").css("background-color", "#0077b6");
        }
    );

    $("#menu-calculus").hover(
        function () {
            $("#lightBar").css("background-color", "#023e8a");
        }
    );

    </script>
  </body>
</html>
